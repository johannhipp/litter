  mac-direct-dist:
    # Reuses the same `mac-release-prep` artifact the TestFlight job
    # consumes — no second Rust build, no second xcgen. The xcarchive +
    # signing + notarization steps run fresh per channel because the
    # signatures and entitlements differ between Mac App Store and
    # Developer ID. Skipped if the Developer ID secrets aren't set, so
    # it's safe to leave wired before you've set up direct dist.
    needs: [detect-release-changes, mac-release-prep]
    if: needs.detect-release-changes.outputs.release_mac_direct == 'true'
    runs-on: macos-26
    timeout-minutes: 90
    environment: release
    # Needed so the auto-publish step can create the `v${MARKETING_VERSION}`
    # release and upload the .dmg as an asset on first build, and clobber
    # it on subsequent builds of the same version.
    permissions:
      contents: write
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Check for direct-dist secrets
        id: gate
        env:
          MAC_DEVELOPER_ID_CERT_P12_B64: ${{ secrets.MAC_DEVELOPER_ID_CERT_P12_B64 }}
          MAC_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.MAC_DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${MAC_DEVELOPER_ID_CERT_P12_B64:-}" || -z "${MAC_DEVELOPER_ID_CERT_PASSWORD:-}" ]]; then
            echo "Direct distribution secrets not configured — skipping."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build dependencies
        if: steps.gate.outputs.configured == 'true'
        run: |
          set -euo pipefail
          brew install xcodegen jq
          xcodebuild -version

      - name: Download Mac release prep artifact
        if: steps.gate.outputs.configured == 'true'
        uses: actions/download-artifact@v4
        with:
          name: mac-release-prep
          path: .ci-prep/mac

      - name: Restore Mac release prep
        if: steps.gate.outputs.configured == 'true'
        run: |
          MAC_PREP_ROOT=.ci-prep/mac
          if [ -d "$MAC_PREP_ROOT/mac" ]; then
            MAC_PREP_ROOT="$MAC_PREP_ROOT/mac"
          fi
          tar -xzf "$MAC_PREP_ROOT/mac-release-prep.tgz" -C .

      - name: Decode App Store Connect API key
        if: steps.gate.outputs.configured == 'true'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY_P8_B64: ${{ secrets.ASC_PRIVATE_KEY_P8_B64 }}
        run: |
          set -euo pipefail
          ASC_KEY_PATH="$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8"
          echo "$ASC_PRIVATE_KEY_P8_B64" | base64 --decode > "$ASC_KEY_PATH"
          chmod 600 "$ASC_KEY_PATH"
          echo "ASC_PRIVATE_KEY_PATH=$ASC_KEY_PATH" >> "$GITHUB_ENV"

      - name: Install Developer ID signing certificate
        if: steps.gate.outputs.configured == 'true'
        env:
          MAC_DEVELOPER_ID_CERT_P12_B64: ${{ secrets.MAC_DEVELOPER_ID_CERT_P12_B64 }}
          MAC_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.MAC_DEVELOPER_ID_CERT_PASSWORD }}
          MAC_DEVELOPER_ID_PROFILE_B64: ${{ secrets.MAC_DEVELOPER_ID_PROFILE_B64 }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/mac-devid-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/mac-devid.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          echo "$MAC_DEVELOPER_ID_CERT_P12_B64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MAC_DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          if [[ -n "${MAC_DEVELOPER_ID_PROFILE_B64:-}" ]]; then
            PROFILE_PATH="$RUNNER_TEMP/mac-devid.provisionprofile"
            echo "$MAC_DEVELOPER_ID_PROFILE_B64" | base64 --decode > "$PROFILE_PATH"

            PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
            mkdir -p "$PROFILE_DIR"
            profile_uuid="$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)"
            profile_name="$(security cms -D -i "$PROFILE_PATH" | plutil -extract Name raw -)"
            cp "$PROFILE_PATH" "$PROFILE_DIR/$profile_uuid.provisionprofile"
            echo "APP_PROVISIONING_PROFILE_SPECIFIER=$profile_name" >> "$GITHUB_ENV"
            echo "EXPORT_SIGNING_STYLE=manual" >> "$GITHUB_ENV"
          else
            echo "EXPORT_SIGNING_STYLE=automatic" >> "$GITHUB_ENV"
          fi

      - name: Build, sign, and notarize DMG
        if: steps.gate.outputs.configured == 'true'
        env:
          SCHEME: LitterMac
          APP_BUNDLE_ID: com.sigkitten.litter
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          APP_PROVISIONING_PROFILE_SPECIFIER: ${{ env.APP_PROVISIONING_PROFILE_SPECIFIER }}
          EXPORT_SIGNING_STYLE: ${{ env.EXPORT_SIGNING_STYLE }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY_PATH: ${{ env.ASC_PRIVATE_KEY_PATH }}
        run: |
          set -euo pipefail
          ./apps/ios/scripts/direct-dist-mac.sh

      - name: Locate built DMG
        if: steps.gate.outputs.configured == 'true'
        id: locate
        run: |
          set -euo pipefail
          DMG_PATH="$(find apps/ios/build/direct-dist-mac -maxdepth 1 -name '*.dmg' | head -n 1)"
          if [[ -z "$DMG_PATH" ]]; then
            echo "No DMG produced" >&2
            exit 1
          fi
          DMG_NAME="$(basename "$DMG_PATH")"
          shasum -a 256 "$DMG_PATH" > "${DMG_PATH}.sha256"
          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload DMG as workflow artifact
        if: steps.gate.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.locate.outputs.dmg_name }}
          path: |
            ${{ steps.locate.outputs.dmg_path }}
            ${{ steps.locate.outputs.dmg_path }}.sha256
          if-no-files-found: error

      - name: Publish DMG to GitHub Release (auto per version)
        if: steps.gate.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          DMG_PATH: ${{ steps.locate.outputs.dmg_path }}
          DMG_NAME: ${{ steps.locate.outputs.dmg_name }}
        run: |
          set -euo pipefail

          # Read the version out of project.yml the same way the scripts do.
          MARKETING_VERSION="$(
            sed -n 's/^[[:space:]]*MARKETING_VERSION:[[:space:]]*"\([^"]*\)".*/\1/p' \
              apps/ios/project.yml | head -n1
          )"
          if [[ -z "$MARKETING_VERSION" ]]; then
            echo "Could not parse MARKETING_VERSION from apps/ios/project.yml" >&2
            exit 1
          fi

          TAG="v${MARKETING_VERSION}"
          BODY=$(cat <<EOF
          Mac Catalyst direct-distribution build for ${TAG}.

          Notarized \`.dmg\`; drag Litter.app into /Applications. The
          asset is overwritten on every CI run that targets this version,
          so the download URL below always points to the latest build.

          Build: $(date -u +%Y-%m-%dT%H:%M:%SZ) / commit ${GITHUB_SHA}

          Download:
          https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${DMG_NAME}
          EOF
          )

          # Three states: (a) release already exists → just clobber the asset,
          # (b) git tag exists but no release → create release against tag,
          # (c) neither exists → create both (tag targets current SHA).
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — updating notes + clobbering asset"
            gh release edit "$TAG" --notes "$BODY"
          elif git rev-parse --verify --quiet "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag $TAG exists but no release — creating release"
            gh release create "$TAG" --title "$TAG" --notes "$BODY"
          else
            echo "Creating tag $TAG + release targeting ${GITHUB_SHA}"
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "$BODY" \
              --target "$GITHUB_SHA"
          fi

          gh release upload "$TAG" "$DMG_PATH" "${DMG_PATH}.sha256" --clobber
          echo "::notice title=DMG published::https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
