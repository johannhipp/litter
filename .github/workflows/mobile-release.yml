          echo "$MAC_DIST_CERT_P12_B64" | base64 --decode > "$CERT_PATH"
          echo "$MAC_APP_STORE_PROFILE_B64" | base64 --decode > "$APP_PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MAC_DIST_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/pkgbuild -T /usr/bin/productbuild -T /usr/bin/productsign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          MAC_PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$MAC_PROFILE_DIR"

          profile_uuid="$(security cms -D -i "$APP_PROFILE_PATH" | plutil -extract UUID raw -)"
          profile_name="$(security cms -D -i "$APP_PROFILE_PATH" | plutil -extract Name raw -)"
